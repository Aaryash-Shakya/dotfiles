$lock_cmd = hyprctl dispatch 'hl.dsp.global("quickshell:lock")' & pidof qs quickshell hyprlock || hyprlock
# $lock_cmd = pidof hyprlock || hyprlock
$suspend_cmd = systemctl suspend || loginctl suspend

general {
    lock_cmd = $lock_cmd
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd = hyprctl dispatch 'hl.dsp.global("quickshell:lockFocus")'
    inhibit_sleep = 3
}

listener {
    timeout = 300 # 5mins
    on-timeout = loginctl lock-session
}

# Disabled: hl.dsp.dpms("off") powers the panel off, but dpms("on") reports
# ok on resume yet does NOT re-power eDP-1 (Hyprland 0.55 / GPU-driver wake
# bug) -> screen stuck blank, only suspend/resume recovers. Re-enable when the
# driver/compositor fixes DPMS wake.
# listener {
#     timeout = 600 # 10mins
#     on-timeout = hyprctl dispatch 'hl.dsp.dpms("off")'
#     on-resume = hyprctl dispatch 'hl.dsp.dpms("on")'
# }

listener {
    timeout = 900 # 15mins
    on-timeout = $suspend_cmd
}
